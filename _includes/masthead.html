{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button class="greedy-nav__toggle hidden" type="button" aria-hidden="true">
          <div class="navicon"></div>
        </button>
        
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-label="Toggle dark mode"
        onclick="
          var root = document.documentElement;
          var current = root.getAttribute('data-theme') || localStorage.getItem('theme') || 'light';
          var next = current === 'dark' ? 'light' : 'dark';
      
          root.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
      
          this.textContent = next === 'dark' ? '☀️' : '🌙';
          this.setAttribute('aria-label', next === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
        "
      >
        🌙
      </button>
      <script>
        (function () {
          var button = document.getElementById("theme-toggle");
          var theme = localStorage.getItem("theme") || document.documentElement.getAttribute("data-theme") || "light";
      
          if (button) {
            button.textContent = theme === "dark" ? "☀️" : "🌙";
            button.setAttribute(
              "aria-label",
              theme === "dark" ? "Switch to light mode" : "Switch to dark mode"
            );
          }
        })();
      </script>
    </div>
  </div>
</div>
